<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zen-G</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="view">
      <div class="clock">
        <p></p>
      </div>
      <div id="cta">

          </select>
          <img src="resource/chevron.svg" alt="chevronIcon" id="chevron" />
        </div>
      </div>
    </div>
  </body>

  <script src="script.js"></script>
</html>
