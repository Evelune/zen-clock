<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zen-G</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        background-color: white;
        color: black;
      }
      body {
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }

      body.dark {
        background-color: black;
        color: white;
      }

      .clock {
        position: relative;

        width: 100vw;
        height: 100vh;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

        font-size: 200px;
        font-weight: 700;
      }

      #cta {
        display: flex;
        gap: 24px;

        position: absolute;
        bottom: 48px;
      }

      #viewScreen {
        background-color: transparent;
        border: 1px solid rgb(70, 70, 70);
        padding: 8px 16px 8px 16px;
        color: inherit;
      }

      #theme {
        background-color: transparent;
        border: 1px solid rgb(70, 70, 70);
        padding: 8px 16px 8px 16px;
        color: inherit;
      }

      #viewScreen:hover {
        border: 1px solid rgb(103, 103, 103);
        cursor: pointer;
      }

      #viewScreen {
        transition: opacity 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div class="clock">
      <p></p>
      
    </div>
  </body>

  <script src="script.js"></script>
</html>
